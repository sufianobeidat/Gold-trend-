function getUsageCount(userId,planId){
  const signals=loadSignals().filter(s=>s.userId===userId);
  if(planId==="free"){const t3=Date.now()-3*24*60*60*1000;return signals.filter(s=>s.ts>t3).length;}
  const today=new Date().toDateString();
  return signals.filter(s=>new Date(s.ts).toDateString()===today).length;
}

function timeAgo(ts,t){
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60)return t.justNow;
  if(s<3600)return `${Math.floor(s/60)}${t.minutes} ${t.ago}`;
  if(s<86400)return `${Math.floor(s/3600)}${t.hours} ${t.ago}`;
  return `${Math.floor(s/86400)}${t.days} ${t.ago}`;
}

          <Input label={t.email} type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder={t.emailPlh}/>
          <Input label={t.password} type="password" value={password} onChange={e=>setPass(e.target.value)} placeholder={t.passPh}/>
          {error&&<p style={{color:C.red,fontSize:13,margin:"0 0 12px",textAlign:"center"}}>{error}</p>}
          <Btn onClick={submit} disabled={loading}>{loading?`⟳ ${t.loading}`:mode==="login"?t.loginBtn:t.registerBtn}</Btn>
        </Card>
        <p style={{color:C.faint,fontSize:11,textAlign:"center",marginTop:16}}>{t.testAcc}: admin@goldtrend.com / admin123</p>
      </div>
    </div>
  );
}

function AnalyzeTab({session,t}){
  const [images,setImages]=useState([]);const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);const [dragOver,setDragOver]=useState(false);
  const fileRef=useRef();
  const plan=PLANS.find(p=>p.id===session.plan)||PLANS[0];
  const used=getUsageCount(session.id,session.plan);
  const remaining=plan.signals===999?999:plan.signals-used;
  const canAnalyze=remaining>0;
  const periodLabel=session.plan==="free"?t.per3Days:t.perDay;

  const handleFiles=(files)=>{
    const imgs=Array.from(files).filter(f=>f.type.startsWith("image/"));
    if(!imgs.length)return;
    setImages(imgs.map(f=>({file:f,url:URL.createObjectURL(f)})));
    setResult(null);
  };

  const analyze=async()=>{
    if(!images.length||!canAnalyze)return;
    setLoading(true);setResult(null);
    try{
      const content=[];
      for(const img of images){const b64=await toBase64(img.file);content.push({type:"image",source:{type:"base64",media_type:img.file.type||"image/jpeg",data:b64}});}
      content.push({type:"text",text:"حلل هذه الشارتات وأعطني الإشارة."});
      const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":ANTHROPIC_API_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:ANTHROPIC_MODEL,max_tokens:1000,system:SYSTEM_PROMPT,messages:[{role:"user",content}]})});
      const data=await resp.json();
      const text=data.content?.map(b=>b.text||"").join("")||t.errorMsg;
      setResult(text.trim());
      const signals=loadSignals();
      signals.unshift({id:Date.now().toString(),userId:session.id,userName:session.name,text:text.trim(),ts:Date.now()});
      saveSignals(signals.slice(0,200));
    }catch{setResult(t.errorMsg);}
    setLoading(false);
  };

  const parsed=parseResult(result);
  const sc=parsed?sigColors(parsed.type):null;

  return(
    <div style={{position:"relative",zIndex:1,paddingTop:8,animation:"fadeUp 0.4s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <span style={{color:C.muted,fontSize:12}}>{t.remaining} {periodLabel}</span>
        <span style={{color:remaining>3?C.green:C.goldBright,fontWeight:700,fontSize:13}}>{plan.signals===999?t.unlimited:`${Math.max(0,remaining)} / ${plan.signals}`}</span>
      </div>
      <div onClick={()=>canAnalyze&&fileRef.current.click()} onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)} onDrop={e=>{e.preventDefault();setDragOver(false);handleFiles(e.dataTransfer.files);}} style={{border:`2px dashed ${dragOver?C.gold:"rgba(200,160,0,0.2)"}`,borderRadius:20,padding:"28px 20px",textAlign:"center",cursor:canAnalyze?"pointer":"not-allowed",background:dragOver?"rgba(200,160,0,0.05)":C.card,transition:"all 0.3s",marginBottom:14,opacity:canAnalyze?1:0.5}}>
        <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>handleFiles(e.target.files)}/>
        {images.length===0?(
          <><div style={{margin:"0 auto 12px",display:"inline-block"}}><GoldTrendLogo size={44}/></div>
          <p style={{color:"rgba(255,255,255,0.6)",margin:0,fontSize:15,fontWeight:600}}>{t.uploadTitle}</p>
          <p style={{color:C.muted,margin:"6px 0 0",fontSize:12}}>{t.uploadSub}</p></>
        ):(
          <><div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center",marginBottom:10}}>
            {images.map((img,i)=><img key={i} src={img.url} alt="" style={{width:64,height:64,objectFit:"cover",borderRadius:10,border:`1px solid rgba(200,160,0,0.3)`}}/>)}
          </div><p style={{color:"rgba(200,160,0,0.8)",fontSize:12,margin:0}}>{images.length} {t.photos}</p></>
        )}
      </div>
      {!canAnalyze&&(
        <Card style={{marginBottom:14,textAlign:"center",border:`1px solid rgba(220,50,50,0.3)`,background:"rgba(220,50,50,0.06)"}}>
          <p style={{color:C.red,margin:0,fontSize:13,fontWeight:600}}>{session.plan==="free"?t.noQuotaFree:t.noQuota}</p>
          <p style={{color:C.muted,margin:"4px 0 0",fontSize:12}}>{t.upgradeHint}</p>
        </Card>
      )}
      <Btn onClick={analyze} disabled={!images.length||loading||!canAnalyze}>
        {loading?<span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}><span style={{animation:"spin 1s linear infinite",display:"inline-block"}}>⟳</span>{t.analyzing}</span>:t.analyzeBtn}
      </Btn>
      {parsed&&(
        <div style={{marginTop:20,borderRadius:24,border:`1px solid ${sc.border}`,background:sc.bg,boxShadow:sc.glow,padding:"28px 24px",animation:"fadeUp 0.4s ease"}}>
          {formatSignal(parsed.text,sc)}
        </div>
      )}
    </div>
  );
}

function HistoryTab({session,t}){
  const all=loadSignals().filter(s=>s.userId===session.id||session.role==="admin");
  const [filter,setFilter]=useState("all");
  const filtered=all.filter(s=>{
    if(filter==="buy")return s.text.startsWith("🟢");
    if(filter==="sell")return s.text.startsWith("🔴");
    if(filter==="wait")return s.text.startsWith("⏳");
    return true;
  });
  return(
    <div style={{position:"relative",zIndex:1,paddingTop:8,animation:"fadeUp 0.4s ease"}}>
      <h2 style={{fontSize:18,fontWeight:800,margin:"0 0 16px",color:C.goldBright}}>{t.histTitle}</h2>
      <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
        {[["all",t.filterAll],["buy",t.filterBuy],["sell",t.filterSell],["wait",t.filterWait]].map(([v,l])=>(
          <button key={v} onClick={()=>setFilter(v)} style={{padding:"6px 14px",borderRadius:20,border:`1px solid ${filter===v?C.gold:C.border}`,background:filter===v?"rgba(200,160,0,0.15)":"transparent",color:filter===v?C.goldBright:C.muted,fontSize:12,fontWeight:600,cursor:"pointer"}}>{l}</button>
        ))}
      </div>
      {filtered.length===0?(
        <Card style={{textAlign:"center",padding:40}}>
          <p style={{color:C.muted,fontSize:32,margin:"0 0 12px"}}>📭</p>
          <p style={{color:C.muted,margin:0}}>{t.noSignals}</p>
        </Card>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {filtered.map(s=>{
            const p=parseResult(s.text);const sc=sigColors(p?.type||"wait");
            const lines=s.text.split("\n").filter(Boolean);
            return(
              <div key={s.id} style={{borderRadius:16,border:`1px solid ${sc.border}40`,background:sc.bg,padding:"16px 18px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <span style={{fontSize:16,fontWeight:800,color:sc.label}}>{lines[0]}</span>
                  <span style={{fontSize:11,color:C.muted}}>{timeAgo(s.ts,t)}</span>
                </div>
                {lines.slice(1).map((l,i)=>{
                  const [k,v]=l.includes(":")?l.split(":"):[null,l];
                  return k?(<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:`1px solid rgba(255,255,255,0.04)`}}><span style={{color:C.muted,fontSize:12}}>{k}</span><span style={{color:C.text,fontSize:13,fontWeight:700,fontFamily:"monospace"}}>{v?.trim()}</span></div>):<p key={i} style={{color:C.muted,fontSize:12,margin:"4px 0 0"}}>{l}</p>;
                })}
                {session.role==="admin"&&<p style={{color:C.faint,fontSize:10,margin:"8px 0 0"}}>👤 {s.userName}</p>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function PlansTab({session,t,onUpgrade}){
  return(
    <div style={{position:"relative",zIndex:1,paddingTop:8,animation:"fadeUp 0.4s ease"}}>
      <h2 style={{fontSize:18,fontWeight:800,margin:"0 0 6px",color:C.goldBright}}>{t.plansTitle}</h2>
      <p style={{color:C.muted,fontSize:13,margin:"0 0 24px"}}>{t.plansSub}</p>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {PLANS.map(plan=>{
          const isCurrent=session.plan===plan.id;
          const pName=t.planNames[plan.id];
          const pDesc=t.planDescs[plan.id];
          const feats=t.planFeats(plan);
          return(
            <div key={plan.id} style={{borderRadius:20,padding:"22px 20px",border:`2px solid ${isCurrent?plan.color:C.border}`,background:isCurrent?"rgba(200,160,0,0.06)":C.card,position:"relative",overflow:"hidden"}}>
              {isCurrent&&<span style={{position:"absolute",top:14,left:14,fontSize:10,padding:"3px 10px",borderRadius:20,background:"rgba(200,160,0,0.2)",color:C.goldBright,fontWeight:700,border:`1px solid rgba(200,160,0,0.3)`}}>{t.currentPlan}</span>}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <div>
                  <h3 style={{margin:0,fontSize:20,fontWeight:900,color:plan.color}}>{pName}</h3>
                  <p style={{margin:"4px 0 0",color:C.muted,fontSize:13}}>{pDesc}</p>
                </div>
                <div style={{textAlign:"center"}}>
                  <span style={{fontSize:24,fontWeight:900,color:C.text}}>{plan.price===0?t.free:`$${plan.price}`}</span>
                  {plan.price>0&&<p style={{color:C.muted,fontSize:11,margin:0}}>{t.perMonth}</p>}
                </div>
              </div>
              <div style={{marginBottom:16}}>
                {feats.map((f,i)=><p key={i} style={{margin:"4px 0",fontSize:13,color:f.startsWith("✓")?"rgba(255,255,255,0.75)":C.faint}}>{f}</p>)}
              </div>
              {!isCurrent&&<Btn onClick={()=>onUpgrade(plan.id)} variant={plan.id==="free"?"ghost":"gold"}>{plan.id==="free"?t.downgradeBtn:`${t.upgradeBtn} ${pName} →`}</Btn>}
            </div>
          );
        })}
      </div>
      <p style={{color:C.faint,fontSize:11,textAlign:"center",marginTop:20}}>{t.stripeNote}</p>
    </div>
  );
}

function AccountTab({session,t,onLogout,onUpdate}){
  const [name,setName]=useState(session.name);const [saved,setSaved]=useState(false);
  const plan=PLANS.find(p=>p.id===session.plan)||PLANS[0];
  const signals=loadSignals().filter(s=>s.userId===session.id);
  const buys=signals.filter(s=>s.text.startsWith("🟢")).length;
  const sells=signals.filter(s=>s.text.startsWith("🔴")).length;
  const waits=signals.filter(s=>s.text.startsWith("⏳")).length;
  const save=()=>{
    const users=loadUsers();const idx=users.findIndex(u=>u.id===session.id);
    if(idx>=0){users[idx].name=name;saveUsers(users);}
    const updated={...session,name};saveSession(updated);onUpdate(updated);setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  };
  return(
    <div style={{position:"relative",zIndex:1,paddingTop:8,animation:"fadeUp 0.4s ease"}}>
      <h2 style={{fontSize:18,fontWeight:800,margin:"0 0 20px",color:C.goldBright}}>{t.accTitle}</h2>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:20}}>
        {[["🟢",buys,t.buy],["🔴",sells,t.sell],["⏳",waits,t.wait]].map(([icon,val,lbl])=>(
          <Card key={lbl} style={{textAlign:"center",padding:"16px 8px"}}>
            <p style={{fontSize:20,margin:"0 0 4px"}}>{icon}</p>
            <p style={{fontSize:22,fontWeight:900,margin:0}}>{val}</p>
            <p style={{fontSize:11,color:C.muted,margin:"2px 0 0"}}>{lbl}</p>
          </Card>
        ))}
      </div>
      <Card style={{marginBottom:14}}>
        <h3 style={{fontSize:14,fontWeight:700,color:C.muted,margin:"0 0 16px",textTransform:"uppercase",letterSpacing:1}}>{t.profile}</h3>
        <Input label={t.fullName} value={name} onChange={e=>setName(e.target.value)}/>
        <div style={{marginBottom:16}}>
          <p style={{color:C.muted,fontSize:12,margin:"0 0 6px",fontWeight:600}}>{t.email}</p>
          <p style={{color:C.faint,fontSize:14,margin:0,padding:"12px 14px",background:"rgba(255,255,255,0.02)",borderRadius:12,border:`1px solid ${C.border}`}}>{session.email}</p>
        </div>
        <div style={{marginBottom:16}}>
          <p style={{color:C.muted,fontSize:12,margin:"0 0 6px",fontWeight:600}}>{t.planLabel}</p>
          <p style={{color:plan.color,fontSize:14,margin:0,fontWeight:700,padding:"12px 14px",background:"rgba(255,255,255,0.02)",borderRadius:12,border:`1px solid ${plan.color}30`}}>{t.planNames[plan.id]} — {t.planDescs[plan.id]}</p>
        </div>
        <Btn onClick={save}>{saved?t.savedBtn:t.saveBtn}</Btn>
      </Card>
      <Btn onClick={onLogout} variant="danger">{t.logoutBtn}</Btn>
    </div>
  );
}

function parseResult(text){
  if(!text)return null;
  if(text.startsWith("🟢"))return{type:"buy",text};
  if(text.startsWith("🔴"))return{type:"sell",text};
  return{type:"wait",text};
}
function sigColors(type){
  return{
    buy:{bg:"rgba(0,200,100,0.08)",border:"#00c864",glow:"0 0 40px rgba(0,200,100,0.25)",label:"#00c864"},
    sell:{bg:"rgba(220,50,50,0.08)",border:"#dc3232",glow:"0 0 40px rgba(220,50,50,0.25)",label:"#dc3232"},
    wait:{bg:"rgba(200,160,0,0.07)",border:"#c8a000",glow:"0 0 30px rgba(200,160,0,0.15)",label:"#c8a000"},
  }[type]||{bg:"rgba(200,160,0,0.07)",border:"#c8a000",glow:"none",label:"#c8a000"};
}
function formatSignal(text,sc){
  const lines=text.split("\n").filter(Boolean);
  return lines.map((line,i)=>{
    const isHeader=i===0;
    const hasSep=line.includes(":")&&!line.startsWith("⏳");
    const [lbl,val]=hasSep?line.split(":"):[null,line];
    return(
      <div key={i} style={{display:"flex",justifyContent:hasSep?"space-between":"center",alignItems:"center",padding:isHeader?"0 0 14px":"8px 0",borderBottom:hasSep&&i<lines.length-1?`1px solid rgba(255,255,255,0.06)`:"none"}}>
        {isHeader?<span style={{fontSize:26,fontWeight:900,letterSpacing:2,color:sc.label}}>{line}</span>
        :hasSep?<><span style={{color:"rgba(255,255,255,0.45)",fontSize:12,fontFamily:"monospace"}}>{lbl}</span><span style={{color:"#fff",fontSize:16,fontWeight:800,fontFamily:"monospace"}}>{val?.trim()}</span></>
        :<span style={{color:"rgba(255,255,255,0.7)",fontSize:14,textAlign:"center",lineHeight:1.6}}>{line}</span>}
      </div>
    );
  });
}

function App(){
  const [lang,setLang]=useState(loadLang);
  const [session,setSession]=useState(loadSession);
  const [tab,setTab]=useState("analyze");
  const [authMode,setAuthMode]=useState("login");
  const t=T[lang||"ar"];

  if(!lang)return <LanguagePicker onSelect={(l)=>{saveLang(l);setLang(l);}}/>;

  const login=(u)=>{saveSession(u);setSession(u);setTab("analyze");};
  const logout=()=>{saveSession(null);setSession(null);};

  if(!session)return <AuthScreen t={t} mode={authMode} setMode={setAuthMode} onLogin={login}/>;

  const NAV=[
    {id:"analyze",icon:"⚡",label:t.analyze},
    {id:"history",icon:"📋",label:t.history},
    {id:"plans",icon:"💎",label:t.plans},
    {id:"account",icon:"👤",label:t.account},
  ];

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Segoe UI',Tahoma,sans-serif",direction:t.dir,paddingBottom:80}}>
      <GlowBg/>
      <Header session={session} t={t}/>
      <div style={{maxWidth:480,margin:"0 auto",padding:"0 16px"}}>
        {tab==="analyze"&&<AnalyzeTab session={session} t={t}/>}
        {tab==="history"&&<HistoryTab session={session} t={t}/>}
        {tab==="plans"&&<PlansTab session={session} t={t} onUpgrade={(plan)=>{
          const users=loadUsers();const idx=users.findIndex(u=>u.id===session.id);
          if(idx>=0){users[idx].plan=plan;saveUsers(users);}
          const updated={...session,plan};saveSession(updated);setSession(updated);
        }}/>}
        {tab==="account"&&<AccountTab session={session} t={t} onLogout={logout} onUpdate={(u)=>{saveSession(u);setSession(u);}}/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:"rgba(8,8,8,0.95)",backdropFilter:"blur(20px)",borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-around",padding:"10px 0 14px"}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setTab(n.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"4px 12px"}}>
            <span style={{fontSize:20,filter:tab===n.id?"none":"grayscale(1) opacity(0.4)"}}>{n.icon}</span>
            <span style={{fontSize:10,color:tab===n.id?C.goldBright:C.muted,fontWeight:tab===n.id?700:400}}>{n.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
